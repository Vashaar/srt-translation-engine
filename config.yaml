source_language: en
target_language: es
provider: lmstudio
model: qwen2.5-7b-instruct
temperature: 0.2
style_profile: balanced
preserve_timing: true
deen_mode: false
lmstudio:
  base_url: http://127.0.0.1:1234/v1
  model: qwen2.5-7b-instruct
runtime:
  prefer_gpu: true
  precision: auto
providers:
  lmstudio:
    base_url: http://127.0.0.1:1234/v1
    model: qwen2.5-7b-instruct
  argos:
    base_url: http://127.0.0.1:1234/v1
    model: qwen2.5-7b-instruct
    auto_download: true
    refine_with_lmstudio: true
  openai:
    model: gpt-5-mini
  manual: {}
line_rebalancing:
  enabled: false
  max_chars_per_line: 42
translation:
  batch_size: 12
  context_window: 3
  use_script_as_source_of_truth: true
  retry_low_confidence: true
  low_confidence_threshold: 0.7
  allow_source_language_leftovers: []
  max_repair_attempts: 1
output:
  output_dir: outputs
  write_review_csv: true
  write_flags_txt: true
  write_bilingual_review: false
glossary:
  default_path:
  do_not_translate: []
  protected_terms:
    allah:
    - Allah
    quran:
    - Qur'an
    - Quran
    hadith:
    - Hadith
    sunnah:
    - Sunnah
  forced_translations:
    prophet:
      en:
        singular: Prophet
        plural: Prophets
      es:
        singular: Profeta
        plural: Profetas
      fr:
        singular: Prophète
        plural: Prophètes
    messenger:
      en:
        singular: Messenger
        plural: Messengers
      es:
        singular: Mensajero
        plural: Mensajeros
